        <div id="overlay">
            <div id="event-div">
                <div id="buttons">
                    <button id="close">X</button>
                </div>
                <form id="event-form">
                    <label for="name">Enter Event name</label>
                    <input type="text" placeholder="Event name..." id="event-name" name="name">
                    <label for="color">Choose event color</label>
                    <input type="color" id="event-color" name="color" value="#ff0000">
                    <input type="submit" value="send" id="send-button">
                </form>
            </div>
        </div>
        <div id="e-overlay">
            <div id="edit-event">
                <div id="close-buttons">
                    <button id="edit-close">X</button>
                </div>
                <div id="eventInfo">
                    <p id="name">Placeholder text</p>
                    <div id="color"></div>
                </div>
                <p id="descp">Event Description:</p>
                <textarea id="event-desc"></textarea>
                <div id="save-buttons">
                    <button id="edit-save">Save Changes</button>
                    <button id="edit-delete">Delete</button>
                </div>
            </div>
