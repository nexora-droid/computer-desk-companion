<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thingondesk</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" />
</head>
<body>
    <p id="title">Computer</p>
    <div class="content">
        <div class="row">
            <div class="widget">
                <p class="caption">Location</p>
                <p id="city" class="values">N/A</p>
                <p id="country">N/A</p>
            </div>
            <div class="widget">
                <p class="caption">Temperature</p>
                <p id="temp-c" class="values">N/A</p>
                <p id="temp-f" class="caption">N/A</p>
            </div>
            <div class="widget">
                <p class="caption">Weather</p>
                <p id="w-icon" class="values"><span class="material-symbols-outlined" id="weather-icon">sunny</span></p>
                <p id="weather" class="caption">N/A</p>
            </div>
            <div class="widget">
                <p class="caption">It is...</p>
                <p id="t-icon" class="values"><span class="material-symbols-outlined" id="time-icon">pending</span></p>
                <p id="daynight" class="caption">Day</p>
            </div>
        </div>
        <div class="row-2">
            <div class="widget">
                <p class="caption">Birthday in...</p>
                <p class="values" id="event-countdown"></p>
                <button class="caption">Add event</button>
            </div>
            <div class="widget">
                <p class="caption">Time</p>
                <p class="values" id="clock"></p>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
